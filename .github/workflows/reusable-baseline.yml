name: Reusable Baseline

on:
  workflow_call:
    inputs:
      policy_path:
        required: true
        type: string
      repo_kind:
        required: false
        type: string
        default: generic
      extra_step_script:
        required: false
        type: string
        default: ''

jobs:
  baseline:
    runs-on: windows-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout eMule-tooling
        uses: actions/checkout@v4
        with:
          repository: eMulebb/eMule-tooling
          ref: ci/v3
          path: tooling

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tracked-file privacy guard
        shell: cmd
        run: >
          python tooling\ci\guard-tracked-files.py
          --repo-root "%CD%\repo"
          --policy-path "%CD%\repo\${{ inputs.policy_path }}"
          --summary-path "%CD%\repo\.ci\tracked-file-privacy-guard-summary.json"

      - name: Run basic hygiene checks
        shell: cmd
        run: >
          python tooling\ci\check-basic-hygiene.py
          --repo-root "%CD%\repo"
          --repo-kind "${{ inputs.repo_kind }}"
          --summary-path "%CD%\repo\.ci\basic-hygiene-summary.json"

      - name: Run optional extra step
        if: ${{ inputs.extra_step_script != '' }}
        shell: cmd
        run: >
          call "%CD%\repo\${{ inputs.extra_step_script }}"
